databases:
  - name: affiliate-db
    plan: free

services:
  - type: web
    name: affiliate-watch-clone
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: affiliate-db
          property: connectionString
